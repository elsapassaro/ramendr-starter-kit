---
global:
  pattern: ramendr-starter-kit
  # Avoid null in Application spec (API requires string). Validated Patterns chart uses these.
  originURL: ""
  experimentalCapabilities: ""
  deletePattern: ""

  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic

  hub:
    provider: aws

main:
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupChartVersion: 0.9.*

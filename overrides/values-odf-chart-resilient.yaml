---
# Resilient (managed clusters / spokes): deploy the storage system so StorageCluster is created.
# Hub uses values-odf-chart.yaml with deploy: false.
storageSystem:
  deploy: true
  inventory:
    nodeJobLabelSelector: 'node-role.kubernetes.io/worker=,!submariner.io/gateway,!node-role.kubernetes.io/infra'
    useSpecificNodes: false

objectStorage:
  enable: true
